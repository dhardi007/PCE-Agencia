<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCE-Agencia API</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
    .card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); text-align: center; }
    h1 { margin: 0 0 .5rem; font-size: 2rem; }
    p { color: #666; margin: 0 0 1.5rem; }
    a { display: inline-block; padding: .75rem 1.5rem; background: #2563eb; color: white; text-decoration: none; border-radius: 8px; font-weight: 500; }
    a:hover { background: #1d4ed8; }
    .api { margin-top: 1rem; font-size: .875rem; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 PCE-Agencia</h1>
    <p>API del sistema de gestión de agencia de viajes</p>
    <a href="http://localhost:5173">Ir al Dashboard</a>
    <div class="api">
      <a href="/api/health" style="background:transparent;color:#2563eb;padding:0">Health Check</a>
    </div>
  </div>
</body>
</html>
