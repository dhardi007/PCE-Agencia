# ══════════════════════════════════════════
# PCE-Agencia — Render Blueprint (Free Tier)
# ══════════════════════════════════════════
# Deploy: Dashboard → New → Blueprint → connect repo dhardi007/PCE-Agencia
# Database: usa PostgreSQL externo (Neon/Supabase/Railway) y pon DATABASE_URL en env vars
# https://render.com/docs/blueprint-spec

services:
  # Backend API (Docker)
  - type: web
    name: pce-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  # Frontend (Docker + Nginx)
  - type: web
    name: pce-frontend
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://pce-backend.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pce-backend.onrender.com/api/*